name: CI (GitHub-hosted)

# Runs on GitHub-hosted machines (ubuntu-latest), unlike ci.yml which uses a self-hosted runner.
# Uses the native run-right GitHub Action instead of calling the binary directly.
#
# HTTP export to the RunRight backend is disabled by default because the backend
# is on a private Tailscale address (100.118.171.101:8080) that GitHub-hosted
# runners cannot reach. Metrics are exported to a file artifact instead.
#
# To enable HTTP export:
#   Option A — expose the backend publicly (reverse proxy / cloud deploy)
#   Option B — add Tailscale to this workflow:
#              uses: tailscale/github-action@v2
#              with: { oauth-client-id: ..., oauth-secret: ..., tags: tag:ci }
#              then add: export: file,http  and  http-url: ${{ vars.RUNRIGHT_URL }}

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        uses: gbudjeakp/run-right@v1.2.1
        with:
          run: npm install
          export: file
          job-id: devops-learn-install-${{ github.run_number }}

      - name: Lint
        uses: gbudjeakp/run-right@v1.2.1
        with:
          run: npm run lint
          export: file
          job-id: devops-learn-lint-${{ github.run_number }}

      - name: Test
        uses: gbudjeakp/run-right@v1.2.1
        with:
          run: npm run test:run
          export: file
          job-id: devops-learn-test-${{ github.run_number }}

      - name: Build
        uses: gbudjeakp/run-right@v1.2.1
        with:
          run: npm run build
          export: file
          job-id: devops-learn-build-${{ github.run_number }}
